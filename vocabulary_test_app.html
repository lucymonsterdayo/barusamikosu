<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランダム単語テスト作成ツール</title>
<style>
    :root {
        --primary-color: #4a90e2;
        --secondary-color: #f39c12;
        --bg-color: #f8f9fa;
        --text-color: #333;
    }
    body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
    }
    .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
    }
    header {
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }
    h1 {
        margin-top: 0;
        color: var(--primary-color);
        font-size: 24px;
    }
    .control-panel {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        align-items: center;
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }
    .control-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
    label {
        font-weight: bold;
        font-size: 14px;
    }
    input[type="number"], select {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 100px;
        font-size: 16px;
    }
    select {
        width: 150px;
    }
    button {
        padding: 10px 20px;
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s;
        font-weight: bold;
    }
    button:hover {
        background-color: #357abd;
    }
    .btn-secondary {
        background-color: var(--secondary-color);
    }
    .btn-secondary:hover {
        background-color: #d68910;
    }
    .btn-container {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }
    
    #print-area {
        display: none;
        background-color: #fff;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .sheet-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-bottom: 2px solid #333;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }
    .sheet-title {
        font-size: 24px;
        font-weight: bold;
        margin: 0;
    }
    .name-score-box {
        display: flex;
        gap: 20px;
    }
    .box {
        border-bottom: 1px solid #333;
        width: 150px;
        padding-bottom: 5px;
        text-align: left;
        font-size: 14px;
        color: #666;
    }
    
    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
    }
    th, td {
        border: 1px solid #333;
        padding: 10px;
        text-align: left;
        font-size: 16px;
    }
    th {
        background-color: #f2f2f2;
    }
    .col-no { width: 10%; text-align: center; }
    .col-q { width: 45%; }
    .col-a { width: 45%; }
    
    .page-break {
        page-break-before: always;
        margin-top: 40px;
        border-top: 1px dashed #ccc;
        padding-top: 40px;
    }

    /* 印刷用スタイル */
    @media print {
        body {
            background-color: #fff;
        }
        .container {
            width: 100%;
            max-width: none;
            padding: 0;
            margin: 0;
        }
        .no-print {
            display: none !important;
        }
        #print-area {
            display: block;
            box-shadow: none;
            padding: 0;
        }
        .page-break {
            page-break-before: always;
            margin-top: 0;
            border-top: none;
            padding-top: 0;
        }
        table {
            page-break-inside: auto;
        }
        tr {
            page-break-inside: avoid;
            page-break-after: auto;
        }
        @page {
            margin: 20mm 15mm;
        }
    }
</style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <header>
            <h1>ランダム単語テスト作成ツール</h1>
            <p>アップロードされたデータ (全1352語) からランダムに単語テストを作成します。</p>
        </header>

        <div class="control-panel">
            <div class="control-group">
                <label>範囲 (開始 No.)</label>
                <input type="number" id="start-no" min="1" max="1352" value="1">
            </div>
            <div class="control-group">
                <label>範囲 (終了 No.)</label>
                <input type="number" id="end-no" min="1" max="1352" value="1352">
            </div>
            <div class="control-group">
                <label>出題数</label>
                <input type="number" id="q-count" min="1" max="200" value="20">
            </div>
            <div class="control-group">
                <label>出題形式</label>
                <select id="q-type">
                    <option value="en-ja">英単語 → 意味</option>
                    <option value="ja-en">意味 → 英単語</option>
                </select>
            </div>
        </div>

        <div class="btn-container" style="margin-bottom: 20px;">
            <button onclick="generateTest()">テストを作成する</button>
            <button class="btn-secondary" onclick="window.print()" id="print-btn" style="display: none;">PDF保存 / 印刷する</button>
        </div>
    </div>

    <!-- 印刷エリア -->
    <div id="print-area">
        <!-- テスト用紙 -->
        <div class="sheet-header">
            <h2 class="sheet-title">単語テスト</h2>
            <div class="name-score-box">
                <div class="box">日付: </div>
                <div class="box">氏名: </div>
                <div class="box">得点: <span style="display:inline-block; width:60px;"></span> / <span id="max-score-disp"></span></div>
            </div>
        </div>
        <table id="test-table">
            <thead>
                <tr>
                    <th class="col-no">No.</th>
                    <th class="col-q">問題</th>
                    <th class="col-a">解答欄</th>
                </tr>
            </thead>
            <tbody>
                <!-- javascriptで生成 -->
            </tbody>
        </table>

        <div class="page-break"></div>

        <!-- 解答用紙 -->
        <div class="sheet-header">
            <h2 class="sheet-title">単語テスト【解答】</h2>
        </div>
        <table id="answer-table">
            <thead>
                <tr>
                    <th class="col-no">No.</th>
                    <th class="col-q">問題</th>
                    <th class="col-a">正解</th>
                </tr>
            </thead>
            <tbody>
                <!-- javascriptで生成 -->
            </tbody>
        </table>
    </div>
</div>

    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function generateTest() {
        const startNo = parseInt(document.getElementById('start-no').value);
        const endNo = parseInt(document.getElementById('end-no').value);
        let qCount = parseInt(document.getElementById('q-count').value);
        const qType = document.getElementById('q-type').value;

        // 範囲フィルタリング
        const filteredData = vocabData.filter(v => v.no >= startNo && v.no <= endNo);
        
        if (filteredData.length === 0) {
            alert('指定された範囲に単語がありません。');
            return;
        }

        if (qCount > filteredData.length) {
            qCount = filteredData.length;
        }

        // ランダム抽出
        const shuffled = shuffleArray(filteredData);
        const selected = shuffled.slice(0, qCount);

        const testTbody = document.querySelector('#test-table tbody');
        const ansTbody = document.querySelector('#answer-table tbody');
        
        testTbody.innerHTML = '';
        ansTbody.innerHTML = '';

        document.getElementById('max-score-disp').textContent = qCount;

        selected.forEach((item, index) => {
            const questionText = (qType === 'en-ja') ? item.word : item.meaning;
            const answerText = (qType === 'en-ja') ? item.meaning : item.word;

            // テスト用行
            const trTest = document.createElement('tr');
            trTest.innerHTML = `
                <td class="col-no">${index + 1}</td>
                <td class="col-q">${questionText}</td>
                <td class="col-a"></td>
            `;
            testTbody.appendChild(trTest);

            // 解答用行
            const trAns = document.createElement('tr');
            trAns.innerHTML = `
                <td class="col-no">${index + 1}</td>
                <td class="col-q">${questionText}</td>
                <td class="col-a">${answerText}</td>
            `;
            ansTbody.appendChild(trAns);
        });

        document.getElementById('print-area').style.display = 'block';
        document.getElementById('print-btn').style.display = 'inline-block';
    }
